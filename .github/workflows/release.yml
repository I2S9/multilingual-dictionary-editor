# Installeurs natifs (jlink + jpackage) sur push de tag sémantique (ex. v1.0.0).
# Chaque OS construit en parallèle et attache ses binaires à la release GitHub du tag.

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  package:
    name: ${{ matrix.runner }} (${{ matrix.javafx }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            javafx: linux
          - runner: windows-latest
            javafx: win
          - runner: macos-latest
            javafx: mac-aarch64

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Install Maven 3.9.9
        shell: bash
        run: |
          curl -fsSL "https://archive.apache.org/dist/maven/maven-3/3.9.9/binaries/apache-maven-3.9.9-bin.tar.gz" | tar xz -C /tmp
          echo "/tmp/apache-maven-3.9.9/bin" >> "$GITHUB_PATH"

      - name: Install outils de paquetage (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y fakeroot rpm

      - name: Image jlink + installeur DEB (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          mvn -B -ntp clean package -pl dictionary-editor-fx -am -Pdist -DskipTests \
            "-Djavafx.platform=${{ matrix.javafx }}" \
            -Djpackage.type=DEB -Djpackage.destSuffix=-deb

      - name: Image jlink + installeur MSI (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mvn -B -ntp clean package -pl dictionary-editor-fx -am -Pdist -DskipTests \
            "-Djavafx.platform=${{ matrix.javafx }}" \
            -Djpackage.type=MSI -Djpackage.destSuffix=-msi

      - name: Installeur EXE (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mvn -B -ntp -pl dictionary-editor-fx -Pdist jpackage:jpackage -DskipTests \
            "-Djavafx.platform=${{ matrix.javafx }}" \
            -Djpackage.type=EXE -Djpackage.destSuffix=-exe

      - name: Image jlink + installeur DMG (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          mvn -B -ntp clean package -pl dictionary-editor-fx -am -Pdist -DskipTests \
            "-Djavafx.platform=${{ matrix.javafx }}" \
            -Djpackage.type=DMG

      - name: Publier les artefacts sur la release GitHub
        uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: false
          generate_release_notes: true
          files: |
            dictionary-editor-fx/target/jpackage*/**/*
